spring.application.name=doctorapp
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/doctorapp}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:6a4b86556e52b3886bff4d09b3cd9a6d7f5e65ac06d17f7c5cb767bf1cbeb7bb}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.jonathanluco.doctorapp=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
